<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lava Jato</title>

<link rel="stylesheet" href="visual.css">

</head>

<body>

<header>

<h1>Lava Jato Controle</h1>

</header>

<main>

<!-- MENU -->

<section id="menu">

<button onclick="abrirTela('novaLavagem')" class="botaoGrande">
Registrar Nova Lavagem
</button>

<button onclick="abrirTela('consultar')" class="botaoGrande">
Consultar Veículo
</button>

</section>


<!-- NOVA LAVAGEM -->

<section id="novaLavagem" class="tela">

<h2>Registrar Lavagem</h2>

<input id="placa" placeholder="Placa do veículo">

<input id="nome" placeholder="Nome do proprietário">

<input id="telefone" placeholder="Telefone">

<button onclick="registrarLavagem()">Salvar Lavagem</button>

<button onclick="voltarMenu()" class="voltar">Voltar</button>

</section>


<!-- CONSULTA -->

<section id="consultar" class="tela">

<h2>Consultar Veículo</h2>

<input id="placaConsulta" placeholder="Digite a placa">

<button onclick="consultarVeiculo()">Consultar</button>

<div id="resultadoConsulta"></div>

<button onclick="voltarMenu()" class="voltar">Voltar</button>

</section>

</main>

<script src="app.js"></script>

</body>

</html>
